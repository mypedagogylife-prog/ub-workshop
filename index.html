<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upward Bound — Virtual Week 1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--purple:#5B50C8;--purple-light:#EEEDFE;--purple-dark:#3C3489;--teal:#1D9E75;--teal-light:#E1F5EE;--amber:#BA7517;--amber-light:#FAEEDA;--gray-100:#F7F6F3;--gray-200:#EDEBE5;--gray-400:#9B9890;--success:#1D9E75;--success-light:#E1F5EE;--danger:#D85A30;--danger-light:#FAECE7;--warning:#BA7517;--warning-light:#FAEEDA;--white:#FFFFFF;--text:#1A1917;--text-muted:#6B6965;--border:rgba(0,0,0,0.08);--border-med:rgba(0,0,0,0.14);--radius:10px;--radius-lg:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--gray-100);color:var(--text);min-height:100vh;line-height:1.6}
.shell{max-width:740px;margin:0 auto;padding:24px 16px 80px}
.topbar{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--purple-dark)}
.logo span{color:var(--gray-400);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;margin-left:8px}
.day-tabs{display:flex;gap:4px}
.dtab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-med);background:transparent;color:var(--text-muted);transition:all .15s;font-family:'DM Sans',sans-serif}
.dtab:hover{background:var(--gray-100)}
.dtab.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.dtab.done{background:var(--success-light);color:var(--success);border-color:var(--success)}
.dtab.done::after{content:' ✓'}
.dtab.locked{opacity:0.45;cursor:not-allowed}
.greeting{font-size:13px;color:var(--text-muted);font-weight:500}
.pbar-wrap{background:var(--gray-200);border-radius:4px;height:5px;margin-bottom:8px;overflow:hidden}
.pbar-fill{height:100%;background:var(--purple);border-radius:4px;transition:width .5s ease}
.timer-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px;color:var(--text-muted)}
.session-timer{font-weight:600;color:var(--purple)}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.step-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.sn-active{background:var(--purple-light);color:var(--purple-dark)}
.card-title{font-size:16px;font-weight:600;color:var(--text)}
.card-sub{font-size:13px;color:var(--text-muted);margin-top:2px}
.timer-badge{margin-left:auto;font-size:12px;font-weight:500;color:var(--purple);background:var(--purple-light);padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.intro-box{border-left:4px solid var(--purple);background:var(--purple-light);border-radius:0 var(--radius) var(--radius) 0;padding:14px 16px;margin-bottom:16px}
.intro-label{font-size:11px;font-weight:600;color:var(--purple);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.intro-text{font-size:14px;color:var(--purple-dark);line-height:1.65}
.example-box{background:var(--gray-100);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.8;color:var(--text-muted);font-style:italic}
.example-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;font-style:normal}
.prompt{background:var(--gray-100);border-radius:var(--radius);padding:14px 16px;font-size:14px;color:var(--text-muted);line-height:1.65;margin-bottom:16px}
.prompt strong{color:var(--text);font-weight:600}
.ref-box{background:var(--purple-light);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;font-size:13px;line-height:2;color:var(--purple-dark)}
.ref-label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--purple);margin-bottom:6px}
textarea{width:100%;min-height:110px;padding:12px 14px;font-size:14px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--white);color:var(--text);resize:vertical;font-family:'DM Sans',sans-serif;line-height:1.6;transition:border .15s}
textarea:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(91,80,200,0.1)}
.name-inp{padding:10px 14px;font-size:15px;font-weight:500;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--white);color:var(--text);width:100%;max-width:300px;font-family:'DM Sans',sans-serif;transition:border .15s}
.name-inp:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(91,80,200,0.1)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border-med);background:transparent;color:var(--text);transition:all .15s;font-family:'DM Sans',sans-serif}
.btn:hover{background:var(--gray-100)}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:var(--purple-dark);border-color:var(--purple-dark)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-outline{background:transparent;color:var(--purple);border-color:var(--purple)}
.btn-outline:hover{background:var(--purple-light)}
.btn-sm{padding:6px 12px;font-size:13px}
.row{display:flex;gap:8px;align-items:center;margin-top:16px;flex-wrap:wrap}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.ai-box{background:var(--purple-light);border-radius:var(--radius-lg);padding:16px 18px;margin-top:16px}
.ai-label{font-size:11px;font-weight:600;color:var(--purple-dark);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.ai-text{font-size:14px;color:var(--purple-dark);line-height:1.7}
.dots{display:flex;gap:5px;padding:4px 0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--purple);opacity:.3;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.followup-box{margin-top:12px;border-top:1px solid rgba(91,80,200,0.15);padding-top:12px}
.followup-label{font-size:12px;font-weight:600;color:var(--purple-dark);margin-bottom:6px}
.followup-inp{width:100%;padding:10px 12px;font-size:13px;border:1px solid rgba(91,80,200,0.3);border-radius:var(--radius);background:rgba(255,255,255,0.7);color:var(--purple-dark);font-family:'DM Sans',sans-serif;resize:none;min-height:60px}
.followup-inp:focus{outline:none;border-color:var(--purple)}
.revision-box{background:var(--white);border:1px solid var(--border-med);border-radius:var(--radius);padding:14px;margin-top:12px}
.revision-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.choices{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.choice{padding:11px 14px;border-radius:var(--radius);font-size:14px;text-align:left;cursor:pointer;border:1px solid var(--border-med);background:var(--white);color:var(--text);transition:all .15s;font-family:'DM Sans',sans-serif;line-height:1.4}
.choice:hover:not(:disabled){border-color:var(--purple);background:var(--purple-light)}
.choice.correct{background:var(--success-light);border-color:var(--success);color:var(--success);font-weight:500}
.choice.wrong{background:var(--danger-light);border-color:var(--danger);color:var(--danger)}
.explain-box{background:var(--gray-100);border-left:3px solid var(--purple);border-radius:0 var(--radius) var(--radius) 0;padding:12px 14px;margin-top:8px;font-size:13px;color:var(--text-muted);line-height:1.65}
.hint-box{background:var(--amber-light);border-left:3px solid var(--amber);border-radius:0 var(--radius) var(--radius) 0;padding:12px 14px;margin-top:8px;font-size:13px;color:var(--text);line-height:1.65}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.b-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--gray-100);border-radius:8px;font-size:13px;color:var(--text)}
.b-row input{width:80px;text-align:right;padding:4px 8px;font-size:13px;border:1px solid var(--border-med);border-radius:6px;background:var(--white);color:var(--text);font-family:'DM Sans',sans-serif}
.b-row input:focus{outline:none;border-color:var(--purple)}
.b-total{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:600;margin-top:6px;transition:background .2s,color .2s}
.vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0}
.vbtn{padding:10px 12px;border-radius:var(--radius);font-size:13px;text-align:left;cursor:pointer;border:1px solid var(--border-med);background:var(--white);color:var(--text);transition:all .15s;line-height:1.4;font-family:'DM Sans',sans-serif}
.vbtn:hover{border-color:var(--purple);background:var(--purple-light)}
.vbtn.voted{background:var(--purple-light);border-color:var(--purple);color:var(--purple-dark);font-weight:500}
.q-label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.5}
.passage{background:var(--gray-100);border-radius:var(--radius);padding:12px 14px;font-size:13px;line-height:1.7;color:var(--text-muted);margin-bottom:12px;font-style:italic}
.complete{background:var(--success-light);border:1px solid var(--success);border-radius:var(--radius-lg);padding:28px;text-align:center;margin-top:16px}
.complete-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--success);margin-bottom:6px}
.complete-sub{font-size:14px;color:var(--success);line-height:1.65;margin-top:6px}
.declaration-prompt{font-family:'Playfair Display',serif;font-size:20px;color:var(--purple-dark);margin:16px 0 10px;line-height:1.3}
.attempt-badge{display:inline-block;font-size:11px;font-weight:600;background:var(--amber-light);color:var(--amber);padding:3px 8px;border-radius:20px;margin-bottom:8px}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo">Upward Bound <span>Virtual Week 1</span></div>
    <div class="day-tabs" id="day-tabs">
      <button class="dtab active" onclick="switchDay(1)" id="tab1">Day 1</button>
      <button class="dtab" onclick="switchDay(2)" id="tab2">Day 2</button>
      <button class="dtab" onclick="switchDay(3)" id="tab3">Day 3</button>
    </div>
    <div class="greeting" id="greet">Welcome!</div>
  </div>
  <div class="pbar-wrap"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>
  <div class="timer-row">
    <span id="progress-label" style="font-size:13px;color:var(--text-muted)"></span>
    <span class="session-timer" id="session-timer">⏱ 0:00</span>
  </div>
  <div id="content"></div>
</div>
<script>
// ── State ─────────────────────────────────────────────────────
const S={name:'',day:1,steps:{1:{cur:0,done:[]},2:{cur:0,done:[]},3:{cur:0,done:[]}},resp:{},votes:{}};
const DAYS={1:['welcome','poem','events','pitch','preview'],2:['d2start','truths','act-eng','act-math','goals','vision'],3:['d3start','budget','alumni','dilemma','declare']};

// ── Unlock dates ───────────────────────────────────────────────
const UNLOCK_DATES={1:new Date('2026-05-24T00:00:00'),2:new Date('2026-05-24T00:00:00'),3:new Date('2026-05-24T00:00:00')};
const DAY_NAMES={1:'Monday, May 26',2:'Tuesday, May 27',3:'Wednesday, May 28'};
function isDayUnlocked(d){return new Date()>=UNLOCK_DATES[d];}
function lockedHTML(d){return `<div class="card" style="text-align:center;padding:40px 24px"><div style="font-size:36px;margin-bottom:16px">🔒</div><div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px">Day ${d} isn't available yet</div><div style="font-size:14px;color:var(--text-muted);line-height:1.65">This workshop unlocks on <strong>${DAY_NAMES[d]}</strong>.<br>Come back then to continue your journey.</div><div style="margin-top:20px;padding:12px 16px;background:var(--purple-light);border-radius:var(--radius);font-size:13px;color:var(--purple-dark)">Complete your other work in the meantime — and we'll see you ${DAY_NAMES[d].split(',')[0]}!</div></div>`;}

// ── Session timer ──────────────────────────────────────────────
let sessionStart = Date.now();
setInterval(()=>{
  const elapsed = Math.floor((Date.now()-sessionStart)/1000);
  const m = Math.floor(elapsed/60), s = elapsed%60;
  document.getElementById('session-timer').textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
},1000);

// ── AI call ────────────────────────────────────────────────────
async function ai(system,user){
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system,user})});
    if(!res.ok){const e=await res.json().catch(()=>({}));return e.error||'Something went wrong. Please try again.';}
    const d=await res.json();return d.text||'No response. Please try again.';
  }catch{return 'Could not reach the AI coach. Please check your connection and try again.';}
}

// ── UI helpers ─────────────────────────────────────────────────
function loading(id){document.getElementById(id).innerHTML=`<div class="ai-box"><div class="ai-label">AI Coach</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;}

function showAI(id, txt, opts={}){
  // opts: { reviseId, revisePromptSystem, originalText, followupContext }
  let html = `<div class="ai-box"><div class="ai-label">AI Coach</div><div class="ai-text">${txt.replace(/\n/g,'<br>')}</div>`;

  // Follow-up dialog
  html += `<div class="followup-box">
    <div class="followup-label">💬 Have a question or want to discuss this further?</div>
    <textarea class="followup-inp" id="fq-${id}" placeholder="Ask the AI coach anything about this feedback..."></textarea>
    <div class="row" style="margin-top:8px">
      <button class="btn btn-outline btn-sm" onclick="sendFollowup('${id}','${opts.followupContext||''}')">Send question →</button>
    </div>
    <div id="fq-resp-${id}"></div>
  </div>`;

  // Revision option
  if(opts.reviseId && opts.revisePromptSystem){
    html += `<div class="revision-box">
      <div class="revision-label">✏️ Want to revise your answer based on this feedback?</div>
      <textarea id="rev-${opts.reviseId}" placeholder="Rewrite your response here incorporating the feedback..." style="min-height:90px;width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border-med);border-radius:var(--radius);font-family:'DM Sans',sans-serif;color:var(--text);background:var(--white);resize:vertical"></textarea>
      <div class="row" style="margin-top:8px">
        <button class="btn btn-primary btn-sm" onclick="submitRevision('${opts.reviseId}','${opts.revisePromptSystem}','${id}')">Submit revision →</button>
      </div>
      <div id="rev-resp-${opts.reviseId}"></div>
    </div>`;
  }

  html += `</div>`;
  document.getElementById(id).innerHTML = html;
}

async function sendFollowup(fbId, context){
  const inp = document.getElementById(`fq-${fbId}`);
  const q = inp ? inp.value.trim() : '';
  if(!q){alert('Please type a question first.');return;}
  const respEl = document.getElementById(`fq-resp-${fbId}`);
  respEl.innerHTML = `<div class="ai-box" style="margin-top:8px"><div class="ai-label">AI Coach</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  const r = await ai(
    `You are a warm Upward Bound AI coach. A student is asking a follow-up question after receiving feedback. Answer their question directly, encouragingly, and concisely. Under 120 words. Context about what they were working on: ${context}`,
    `Student: ${S.name}\nFollow-up question: ${q}`
  );
  respEl.innerHTML = `<div class="ai-box" style="margin-top:8px"><div class="ai-label">AI Coach</div><div class="ai-text">${r.replace(/\n/g,'<br>')}</div></div>`;
  inp.value = '';
}

async function submitRevision(revId, systemKey, fbId){
  const inp = document.getElementById(`rev-${revId}`);
  const v = inp ? inp.value.trim() : '';
  if(v.length < 20){alert('Please write more in your revision.');return;}
  const respEl = document.getElementById(`rev-resp-${revId}`);
  respEl.innerHTML = `<div class="ai-box" style="margin-top:8px"><div class="ai-label">AI Coach</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  const systems = {
    poem: `You are a warm Upward Bound writing coach. The student has revised their "I Am From" poem after receiving feedback. Compare this revision to their original approach and highlight specifically what improved. Be encouraging and specific. Under 110 words.`,
    events: `You are an Upward Bound coach. The student revised their current events analysis after feedback. Highlight what got stronger and sharper. Under 90 words.`,
    pitch: `You are a public speaking coach. The student revised their 60-second pitch after feedback. Identify the 2 most notable improvements and give one final tip. Under 110 words.`,
    goals: `You are a SMART goals coach. The student revised their goals after feedback. Confirm what's now stronger — is it more specific? More measurable? Affirm the improvement. Under 100 words.`,
    vision: `You are an inspiring Upward Bound coach. The student revised their college vision after feedback. Celebrate what's more vivid or concrete now. Under 90 words.`,
    budget: `You are a financial literacy coach. The student has revised their budget thinking after feedback. Affirm what they've reconsidered and encourage the improved approach. Under 100 words.`,
    alumni: `You are an Upward Bound coach. The student has deepened their alumni reflection after feedback. Celebrate the growth in their thinking. Under 90 words.`,
    dilemma: `You are a life skills coach. The student has elaborated on their dilemma reasoning after feedback. Affirm the deeper thinking they're showing. Under 100 words.`,
  };
  const system = systems[systemKey] || `You are an Upward Bound coach. The student revised their response. Affirm what improved specifically. Under 100 words.`;
  const original = S.resp[revId] || '';
  const r = await ai(system, `Student: ${S.name}\nOriginal response: ${original}\nRevised response: ${v}`);
  S.resp[`${revId}_revised`] = v;
  respEl.innerHTML = `<div class="ai-box" style="margin-top:8px"><div class="ai-label">AI Coach — Revision Feedback</div><div class="ai-text">${r.replace(/\n/g,'<br>')}</div></div>`;
}

function show(id){const el=document.getElementById(id);if(el)el.style.display='block';}
function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}

// ── Progress ───────────────────────────────────────────────────
function updateProgress(){
  const steps=DAYS[S.day];
  const done=S.steps[S.day].done.length;
  const pct=Math.round((done/steps.length)*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`Day ${S.day} — Activity ${Math.min(S.steps[S.day].cur+1,steps.length)} of ${steps.length}`;
}
function advance(){
  const steps=DAYS[S.day];const s=S.steps[S.day];
  if(!s.done.includes(steps[s.cur]))s.done.push(steps[s.cur]);
  if(s.cur<steps.length-1)s.cur++;
  updateProgress();render();window.scrollTo({top:0,behavior:'smooth'});
}
function markDone(day){
  const steps=DAYS[day];const s=S.steps[day];const cur=steps[s.cur];
  if(!s.done.includes(cur))s.done.push(cur);
  updateProgress();
  const tab=document.getElementById('tab'+day);
  tab.className='dtab'+(S.day===day?' active':'')+(s.done.length===steps.length?' done':'');
}
function switchDay(d){
  if(!isDayUnlocked(d))return;
  S.day=d;
  [1,2,3].forEach(i=>{
    const all=DAYS[i].length,done=S.steps[i].done.length,locked=!isDayUnlocked(i);
    document.getElementById('tab'+i).className='dtab'+(i===d?' active':'')+(done===all&&all>0?' done':'')+(locked?' locked':'');
  });
  updateProgress();render();window.scrollTo({top:0,behavior:'smooth'});
}
function render(){
  if(!isDayUnlocked(S.day)){document.getElementById('content').innerHTML=lockedHTML(S.day);return;}
  if(S.day===1)rDay1();
  if(S.day===2)rDay2();
  if(S.day===3)rDay3();
}

// ════════════════════════════════════════════════════════════════
// DAY 1
// ════════════════════════════════════════════════════════════════
function rDay1(){const c=S.steps[1].cur;const fns=[d1_welcome,d1_poem,d1_events,d1_pitch,d1_preview];document.getElementById('content').innerHTML=fns[c]();}

function d1_welcome(){return `<div class="card">
  <div class="card-header"><div class="step-num sn-active">1</div><div><div class="card-title">Welcome to Upward Bound</div><div class="card-sub">Day 1 — Who Are You? · ~2 hours</div></div></div>
  <div class="intro-box"><div class="intro-label">About Day 1</div><div class="intro-text">This is your first day of a 3-day virtual workshop. Work at your own pace — there are no grades here. An AI coach will read everything you write and respond personally to you.<br><br>Today is all about your voice, your identity, and getting excited about the summer ahead. There are 5 activities — most take 15–25 minutes each when you include reading the feedback and revising your work.<br><br>The session timer in the top right tracks your time.</div></div>
  <div class="prompt"><strong>Let's start with your name.</strong></div>
  <input class="name-inp" id="nf" placeholder="Your first name..." value="${S.name}">
  <div class="row"><button class="btn btn-primary" onclick="saveName()">Let's go →</button></div>

function d1_poem(){return `<div class="card">

// ACT with retry logic
const actAttempts = {};
function renderQ(section, idx, attempt){
  const qs=ACT[section];
  if(idx>=qs.length){show(section==='eng'?'eng-nx':'math-nx');return;}
  const q=qs[idx];
  const cid=`act-${section}-container`;
  const el=document.getElementById(cid);if(!el)return;
  const attemptKey = `${section}-${idx}`;
  actAttempts[attemptKey] = attempt;

  let h=`<div id="actq-${section}-${idx}">`;
  if(idx>0)h+=`<div class="divider"></div>`;
  if(attempt>0)h+=`<div class="attempt-badge">Attempt ${attempt+1} — use the hint below!</div>`;
  h+=`<div class="q-label">Question ${idx+1} of ${qs.length}</div>`;
  if(q.pass)h+=`<div class="passage">${q.pass}</div>`;
  h+=`<div class="q-text">${q.q}</div>`;
  if(attempt>0)h+=`<div class="hint-box">💡 <strong>Hint:</strong> ${q.hint}</div>`;
  h+=`<div class="choices" id="ch-${section}-${idx}-${attempt}">`;
  q.opts.forEach((opt,i)=>{h+=`<button class="choice" onclick="answerQ('${section}',${idx},'${'ABCD'[i]}',${attempt})">${opt}</button>`;});
  h+=`</div><div id="exp-${section}-${idx}"></div></div>`;

  // Replace or append
  const existing = document.getElementById(`actq-${section}-${idx}`);
  if(existing){existing.outerHTML=h;}
  else{el.innerHTML+=h;}
}

function answerQ(section,idx,chosen,attempt){
  const q=ACT[section][idx];
  const isRight=chosen===q.ans;
  document.querySelectorAll(`#ch-${section}-${idx}-${attempt} .choice`).forEach(btn=>{
    btn.disabled=true;
    const letter=btn.textContent.trim()[0];
    if(letter===q.ans)btn.className='choice correct';
    else if(letter===chosen&&!isRight)btn.className='choice wrong';
  });

  if(!isRight && attempt===0){
    // First wrong attempt — show hint and retry
    document.getElementById(`exp-${section}-${idx}`).innerHTML=
      `<div class="hint-box">❌ Not quite. Here's a hint — try once more!<br><br>💡 <strong>${q.hint}</strong></div>`;
    setTimeout(()=>renderQ(section,idx,1),800);
  } else {
    // Show full explanation (correct or second attempt)
    document.getElementById(`exp-${section}-${idx}`).innerHTML=
      `<div class="explain-box"><strong>${isRight?'Correct! ✓':'Here\'s the answer —'}</strong> ${q.explain}</div>`;
    setTimeout(()=>renderQ(section,idx+1,0),800);
  }
}

  <div class="card-header"><div class="step-num sn-active">1</div><div><div class="card-title">Welcome to Day 3</div><div class="card-sub">How do you navigate the world? · ~2 hours</div></div></div>
  <div class="intro-box"><div class="intro-label">About Day 3</div><div class="intro-text">Today: Budget Simulation · Alumni Wisdom · Decision Dilemmas · Your Summer Declaration.<br><br>This is the most practical day. Real money, real decisions, real life. After each activity you can revise your thinking and ask the AI coach follow-up questions before moving on.</div></div>
  <div class="row"><button class="btn btn-primary" onclick="advance()">Start Day 3 →</button></div>
</div>`;}

function d3_budget(){return `<div class="card">
  <div class="card-header"><div class="step-num sn-active">2</div><div><div class="card-title">Budget Simulation — Reality Check</div><div class="card-sub">Financial literacy</div></div><div class="timer-badge">⏱ 20–25 min</div></div>
  <div class="intro-box"><div class="intro-label">What is this activity?</div><div class="intro-text">Most people learn about money the hard way — by running out of it. This simulation lets you make mistakes safely. After the AI coach analyzes your budget, you can <strong>revise your approach</strong> and ask follow-up questions about real financial strategies.</div></div>
  <div class="example-box" style="font-style:normal"><div class="example-label">Your scenario</div><strong>Job:</strong> Medical Office Receptionist &nbsp;·&nbsp; <strong>City:</strong> Orlando, FL<br><strong>Take-home pay:</strong> $2,400/month &nbsp;·&nbsp; <strong>Average 1-BR rent:</strong> $1,300/month<br><strong>Life event:</strong> Dental emergency — crown needed. Insurance covers 50%. <strong>Your bill: $600.</strong></div>
  <div class="budget-grid">
    <div class="b-row"><span>Rent</span><input id="b0" type="number" min="0" placeholder="$" oninput="calcB()"></div>
    <div class="b-row"><span>Groceries</span><input id="b1" type="number" min="0" placeholder="$" oninput="calcB()"></div>
    <div class="b-row"><span>Phone</span><input id="b2" type="number" min="0" placeholder="$" oninput="calcB()"></div>
    <div class="b-row"><span>Transportation</span><input id="b3" type="number" min="0" placeholder="$" oninput="calcB()"></div>
    <div class="b-row"><span>Utilities</span><input id="b4" type="number" min="0" placeholder="$" oninput="calcB()"></div>
    <div class="b-row"><span>Personal care</span><input id="b5" type="number" min="0" placeholder="$" oninput="calcB()"></div>
    <div class="b-row"><span>Entertainment</span><input id="b6" type="number" min="0" placeholder="$" oninput="calcB()"></div>
    <div class="b-row"><span>Dental bill</span><input id="b7" type="number" min="0" placeholder="$600" oninput="calcB()"></div>
    <div class="b-row"><span>Emergency savings</span><input id="b8" type="number" min="0" placeholder="$" oninput="calcB()"></div>
  </div>
  <div class="b-total" style="background:var(--gray-100);color:var(--text-muted)"><span>Total spent</span><span id="btot-n">$0</span></div>
  <div class="b-total" id="bremain" style="background:var(--success-light);color:var(--success)"><span>Remaining from $2,400</span><span id="brem-n">$2,400</span></div>
  <div class="row"><button class="btn btn-primary" onclick="subBudget()">Submit budget for AI feedback →</button></div>
  <div id="budget-fb"></div>
  <div id="budget-nx" style="display:none"><div class="divider"></div><div class="row"><button class="btn btn-primary" onclick="advance()">I'm done — next activity →</button></div></div>
</div>`;}

function d3_alumni(){return `<div class="card">
  <div class="card-header"><div class="step-num sn-active">3</div><div><div class="card-title">Alumni Wisdom — Guided Reflection</div><div class="card-sub">Learning from those who went before you</div></div><div class="timer-badge">⏱ 20 min</div></div>
  <div class="intro-box"><div class="intro-label">What is this activity?</div><div class="intro-text">Real Upward Bound alumni were asked: "What do you wish someone had told you?" Read their answers slowly. One will hit differently. That's the one to write about.<br><br>After getting AI feedback, you can <strong>deepen your reflection</strong> and ask follow-up questions.</div></div>
  <div class="example-box" style="font-style:normal"><div class="example-label">Three things alumni have said</div>
    <div style="margin-bottom:10px;font-style:italic">"The first semester of college, I cried almost every week. I thought everyone else was smarter than me. They weren't — they were just better at pretending."</div>
    <div style="margin-bottom:10px;font-style:italic">"No one taught me about credit cards. I had $4,000 in debt before I turned 20. Start your emergency fund the day you get your first paycheck — even $25."</div>
    <div style="font-style:italic">"What changed everything was learning to ask for help. I wasted a whole year trying to figure things out alone because I was embarrassed."</div>
  </div>
  <div class="ref-box"><div class="ref-label">Reflect on this below</div>
    <div>Which quote hits closest to home — and why?</div>
    <div>What is one thing you want to do differently because of it?</div>
  </div>
  <textarea id="alumni" placeholder="The quote that resonates most is... because...&#10;One thing I'm going to do differently is..." style="min-height:110px">${S.resp.alumni||''}</textarea>
  <div class="row"><button class="btn btn-primary" onclick="subAlumni()">Get AI reflection →</button></div>
  <div id="alumni-fb"></div>
  <div id="alumni-nx" style="display:none"><div class="divider"></div><div class="row"><button class="btn btn-primary" onclick="advance()">I'm done — next activity →</button></div></div>
</div>`;}

function d3_dilemma(){return `<div class="card">
  <div class="card-header"><div class="step-num sn-active">4</div><div><div class="card-title">Decision Dilemmas</div><div class="card-sub">No official right answers — only your reasoning</div></div><div class="timer-badge">⏱ 20–25 min</div></div>
  <div class="intro-box"><div class="intro-label">What is this activity?</div><div class="intro-text">Vote on three real dilemmas, then explain your reasoning. After the AI coach responds, you can <strong>push the conversation further</strong> — ask follow-up questions, challenge the frameworks, or explore what you'd do differently.</div></div>
  <div class="q-label" style="margin-top:4px">Dilemma 1 — Academic integrity</div>
  <div class="q-text">Your best friend is failing AP Chemistry and asks to copy your homework. Failing would cost them their scholarship.</div>
  <div class="vote-grid">
    <button class="vbtn" id="v1A" onclick="castVote(1,'A')">A. Share it — one assignment won't hurt</button>
    <button class="vbtn" id="v1B" onclick="castVote(1,'B')">B. Refuse, offer to walk them through it on a call</button>
    <button class="vbtn" id="v1C" onclick="castVote(1,'C')">C. Share once, tell them to talk to the teacher</button>
    <button class="vbtn" id="v1D" onclick="castVote(1,'D')">D. Tell a counselor so they get real support</button>
  </div>
  <div class="q-label" style="margin-top:14px">Dilemma 2 — Honesty and loyalty</div>
  <div class="q-text">You're given $10 too much change. Your friend runs the register and pays the difference from their own money if it's short.</div>
  <div class="vote-grid">
    <button class="vbtn" id="v2A" onclick="castVote(2,'A')">A. Keep it — their mistake</button>
    <button class="vbtn" id="v2B" onclick="castVote(2,'B')">B. Return it immediately</button>
    <button class="vbtn" id="v2C" onclick="castVote(2,'C')">C. Tell your friend privately so they can fix it</button>
    <button class="vbtn" id="v2D" onclick="castVote(2,'D')">D. Pay it back anonymously later</button>
  </div>
  <div class="q-label" style="margin-top:14px">Dilemma 3 — Standing up</div>
  <div class="q-text">A classmate is being talked about negatively in the group chat. You haven't said anything mean — but nothing at all.</div>
  <div class="vote-grid">
    <button class="vbtn" id="v3A" onclick="castVote(3,'A')">A. Stay out of it</button>
    <button class="vbtn" id="v3B" onclick="castVote(3,'B')">B. Text the person privately to check in</button>
    <button class="vbtn" id="v3C" onclick="castVote(3,'C')">C. Call it out in the group chat</button>
    <button class="vbtn" id="v3D" onclick="castVote(3,'D')">D. Tell a trusted adult or counselor</button>
  </div>
  <div class="divider"></div>
  <div class="ref-box"><div class="ref-label">Reflect below</div><div>Which dilemma was hardest — and what does that tell you about your values?</div></div>
  <textarea id="dilemma" placeholder="The hardest one for me was... because...&#10;What I think it says about my values is..." style="min-height:100px">${S.resp.dilemma||''}</textarea>
  <div class="row"><button class="btn btn-primary" onclick="subDilemma()">Get AI perspective →</button></div>
  <div id="dilemma-fb"></div>
  <div id="dilemma-nx" style="display:none"><div class="divider"></div><div class="row"><button class="btn btn-primary" onclick="advance()">I'm done — final activity →</button></div></div>
</div>`;}

function d3_declare(){return `<div class="card">
  <div class="card-header"><div class="step-num sn-active">5</div><div><div class="card-title">My Summer Declaration</div><div class="card-sub">Your words — played back at Week 5</div></div><div class="timer-badge">⏱ 10 min</div></div>
  <div class="intro-box"><div class="intro-label">What is this activity?</div><div class="intro-text">This is the final activity of your virtual week. You're going to make a declaration — a promise to yourself about what this summer will mean.<br><br>Your words will be saved and read back to you at the final in-person showcase at the end of Week 5. Make them count.</div></div>
  <div class="declaration-prompt">"This summer, I will…"</div>
  <textarea id="decl" placeholder="Be specific. Be bold. This is your promise to yourself." style="min-height:80px">${S.resp.declare||''}</textarea>
  <div class="row"><button class="btn btn-success" onclick="subDecl()">Complete all 3 days ✓</button></div>
  <div id="decl-fb"></div>
</div>`;}

function calcB(){let total=0;for(let i=0;i<9;i++)total+=parseFloat(document.getElementById('b'+i)?.value||0);total=Math.round(total);const rem=2400-total;document.getElementById('btot-n').textContent='$'+total.toLocaleString();document.getElementById('brem-n').textContent='$'+rem.toLocaleString();const el=document.getElementById('bremain');if(rem<0){el.style.background='var(--danger-light)';el.style.color='var(--danger)';}else if(rem<100){el.style.background='var(--warning-light)';el.style.color='var(--warning)';}else{el.style.background='var(--success-light)';el.style.color='var(--success)';}}

async function subBudget(){const labels=['Rent','Groceries','Phone','Transport','Utilities','Personal','Entertainment','Dental','Savings'];let total=0,lines=[];for(let i=0;i<9;i++){const v=parseFloat(document.getElementById('b'+i)?.value||0);if(v>0){total+=v;lines.push(`${labels[i]}: $${v}`);}}const rem=2400-Math.round(total);S.resp.budget=lines.join(', ')+` | Remaining: $${rem}`;loading('budget-fb');const r=await ai(`You are a financial literacy coach for Upward Bound students. The student built a monthly budget on $2,400/month in Orlando with a $600 dental bill. Analyze specifically: did they go over? Is rent realistic? Did they save anything? Give 2 concrete actionable tips. Warm and real. Under 130 words.`,`Budget:\n${lines.join('\n')}\nTotal: $${Math.round(total)}\nRemaining: $${rem}`);showAI('budget-fb',r,{reviseId:'budget',revisePromptSystem:'budget',followupContext:'the student built a monthly budget on $2400/month with a $600 dental emergency in Orlando FL'});show('budget-nx');}

function castVote(num,choice){S.votes[num]=choice;'ABCD'.split('').forEach(l=>{const el=document.getElementById(`v${num}${l}`);if(el)el.className='vbtn'+(l===choice?' voted':'');});}

async function subAlumni(){const v=val('alumni');if(v.length<20){alert('Please write more.');return;}S.resp.alumni=v;loading('alumni-fb');const r=await ai(`You are an Upward Bound coach. The student reflected on alumni wisdom about imposter syndrome, debt, and asking for help. Affirm what they wrote. Connect to one concrete action they can take THIS summer. Under 110 words.`,`Student: ${S.name}\nReflection:\n${v}`);showAI('alumni-fb',r,{reviseId:'alumni',revisePromptSystem:'alumni',followupContext:'the student reflected on alumni wisdom quotes about imposter syndrome, credit card debt, and asking for help'});show('alumni-nx');}

async function subDilemma(){const v=val('dilemma');if(v.length<20){alert('Please explain your reasoning first.');return;}S.resp.dilemma=v;const voteStr=Object.entries(S.votes).map(([d,c])=>`Dilemma ${d}: ${c}`).join(', ')||'(no votes)';loading('dilemma-fb');const r=await ai(`You are a life skills coach for Upward Bound students. The student voted on 3 ethical dilemmas and explained their reasoning. Don't judge right/wrong. Affirm their process. Introduce one framework: short-term vs long-term, who is affected, or the daylight test. Ask one sharp follow-up question. Under 120 words.`,`Student: ${S.name}\nVotes: ${voteStr}\nReasoning: ${v}`);showAI('dilemma-fb',r,{reviseId:'dilemma',revisePromptSystem:'dilemma',followupContext:'the student voted on ethical dilemmas about academic integrity, honesty, and standing up for others'});show('dilemma-nx');}

async function submitCompletion(){
  try{await fetch('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:S.name,declaration:S.resp.declare||'',poem:S.resp.poem||'',pitch:S.resp.pitch||'',goals:S.resp.goals||'',vision:S.resp.vision||'',budget:S.resp.budget||'',preview:S.resp.preview||'',alumni:S.resp.alumni||''})});}
  catch(e){console.log('Submission error:',e);}
}

async function subDecl(){const v=val('decl');if(v.length<15){alert('Please complete your declaration.');return;}S.resp.declare=v;loading('decl-fb');const r=await ai(`You are an Upward Bound coach delivering a final powerful closing message. The student completed all 3 virtual workshops and wrote their summer declaration. Reflect their exact words back. Tell them it's recorded and will be played at the Week 5 showcase. Make them feel the weight of this commitment. Warm, personal, powerful. Under 120 words.`,`Student: ${S.name}\nDeclaration: "This summer, I will ${v}"`);showAI('decl-fb',r,{followupContext:'the student just completed all 3 days and wrote their summer declaration'});markDone(3);submitCompletion();setTimeout(()=>{document.getElementById('content').innerHTML+=`<div class="complete"><div class="complete-title" style="font-size:26px">All 3 days complete, ${S.name}.</div><div class="complete-sub" style="font-size:15px;margin-top:8px">You showed up three times this week. Virtually. Before the summer even started.<br>That tells us everything we need to know about you.<br><br><strong>See you in person. Let's go.</strong></div></div>`;},500);}

// ── Init ───────────────────────────────────────────────────────
[1,2,3].forEach(i=>{if(!isDayUnlocked(i))document.getElementById('tab'+i).classList.add('locked');});
render();
</script>
</body>
</html>
