<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upward Bound — Virtual Week 1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #5B50C8;
  --purple-light: #EEEDFE;
  --purple-dark: #3C3489;
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --coral: #D85A30;
  --gray-100: #F7F6F3;
  --gray-200: #EDEBE5;
  --gray-400: #9B9890;
  --gray-700: #3A3935;
  --success: #1D9E75;
  --success-light: #E1F5EE;
  --danger: #D85A30;
  --danger-light: #FAECE7;
  --warning-light: #FAEEDA;
  --warning: #BA7517;
  --white: #FFFFFF;
  --text: #1A1917;
  --text-muted: #6B6965;
  --border: rgba(0,0,0,0.08);
  --border-med: rgba(0,0,0,0.14);
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--gray-100);color:var(--text);min-height:100vh;line-height:1.6}

.shell{max-width:740px;margin:0 auto;padding:24px 16px 60px}

.topbar{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--purple-dark);letter-spacing:-0.01em}
.logo span{color:var(--gray-400);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;margin-left:8px}

.day-tabs{display:flex;gap:4px}
.dtab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-med);background:transparent;color:var(--text-muted);transition:all .15s}
.dtab:hover{background:var(--gray-100)}
.dtab.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.dtab.done{background:var(--success-light);color:var(--success);border-color:var(--success)}
.dtab.done::after{content:' ✓'}

.greeting{font-size:13px;color:var(--text-muted);font-weight:500}

.pbar-wrap{background:var(--gray-200);border-radius:4px;height:5px;margin-bottom:20px;overflow:hidden}
.pbar-fill{height:100%;background:var(--purple);border-radius:4px;transition:width .5s ease}

.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.step-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.sn-active{background:var(--purple-light);color:var(--purple-dark)}
.sn-done{background:var(--success-light);color:var(--success)}
.sn-wait{background:var(--gray-200);color:var(--gray-400)}
.card-title{font-size:16px;font-weight:600;color:var(--text)}
.card-sub{font-size:13px;color:var(--text-muted);margin-top:2px}
.timer-badge{margin-left:auto;font-size:12px;font-weight:500;color:var(--purple);background:var(--purple-light);padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}

.prompt{background:var(--gray-100);border-radius:var(--radius);padding:14px 16px;font-size:14px;color:var(--text-muted);line-height:1.65;margin-bottom:16px}
.prompt strong{color:var(--text);font-weight:600}

textarea{width:100%;min-height:100px;padding:12px 14px;font-size:14px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--white);color:var(--text);resize:vertical;font-family:'DM Sans',sans-serif;line-height:1.6;transition:border .15s}
textarea:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(91,80,200,0.1)}
.name-inp{padding:10px 14px;font-size:15px;font-weight:500;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--white);color:var(--text);width:100%;max-width:300px;font-family:'DM Sans',sans-serif;transition:border .15s}
.name-inp:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(91,80,200,0.1)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border-med);background:transparent;color:var(--text);transition:all .15s;font-family:'DM Sans',sans-serif}
.btn:hover{background:var(--gray-100)}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:var(--purple-dark);border-color:var(--purple-dark)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}

.row{display:flex;gap:8px;align-items:center;margin-top:16px;flex-wrap:wrap}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}

.ai-box{background:var(--purple-light);border-radius:var(--radius-lg);padding:16px 18px;margin-top:16px}
.ai-label{font-size:11px;font-weight:600;color:var(--purple-dark);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ai-text{font-size:14px;color:var(--purple-dark);line-height:1.7}
.dots{display:flex;gap:5px;padding:4px 0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--purple);opacity:.3;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

.choices{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.choice{padding:11px 14px;border-radius:var(--radius);font-size:14px;text-align:left;cursor:pointer;border:1px solid var(--border-med);background:var(--white);color:var(--text);transition:all .15s;font-family:'DM Sans',sans-serif;line-height:1.4}
.choice:hover:not(:disabled){border-color:var(--purple);background:var(--purple-light)}
.choice.correct{background:var(--success-light);border-color:var(--success);color:var(--success)}
.choice.wrong{background:var(--danger-light);border-color:var(--danger);color:var(--danger)}
.explain-box{background:var(--gray-100);border-left:3px solid var(--purple);border-radius:0 var(--radius) var(--radius) 0;padding:12px 14px;margin-top:8px;font-size:13px;color:var(--text-muted);line-height:1.65}

.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.b-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--gray-100);border-radius:8px;font-size:13px;color:var(--text)}
.b-row input{width:80px;text-align:right;padding:4px 8px;font-size:13px;border:1px solid var(--border-med);border-radius:6px;background:var(--white);color:var(--text);font-family:'DM Sans',sans-serif}
.b-row input:focus{outline:none;border-color:var(--purple)}
.b-total{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:600;margin-top:6px;transition:background .2s,color .2s}

.vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0}
.vbtn{padding:10px 12px;border-radius:var(--radius);font-size:13px;text-align:left;cursor:pointer;border:1px solid var(--border-med);background:var(--white);color:var(--text);transition:all .15s;line-height:1.4;font-family:'DM Sans',sans-serif}
.vbtn:hover{border-color:var(--purple);background:var(--purple-light)}
.vbtn.voted{background:var(--purple-light);border-color:var(--purple);color:var(--purple-dark);font-weight:500}

.q-label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.5}
.passage{background:var(--gray-100);border-radius:var(--radius);padding:12px 14px;font-size:13px;line-height:1.7;color:var(--text-muted);margin-bottom:12px;font-style:italic}

.complete{background:linear-gradient(135deg,var(--success-light),#D0F0E4);border:1px solid var(--success);border-radius:var(--radius-lg);padding:28px;text-align:center;margin-top:16px}
.complete-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--success);margin-bottom:6px}
.complete-sub{font-size:14px;color:var(--success);opacity:.85}

.declaration-big{font-family:'Playfair Display',serif;font-size:20px;color:var(--purple-dark);margin:16px 0 10px;line-height:1.3}
</style>
</head>
<body>
<div class="shell">

<div class="topbar">
  <div class="logo">Upward Bound <span>Virtual Week 1</span></div>
  <div class="day-tabs">
    <button class="dtab active" onclick="switchDay(1)" id="tab1">Day 1</button>
    <button class="dtab" onclick="switchDay(2)" id="tab2">Day 2</button>
    <button class="dtab" onclick="switchDay(3)" id="tab3">Day 3</button>
  </div>
  <div class="greeting" id="greet">Welcome!</div>
</div>

<div class="pbar-wrap"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>

<div id="content"></div>

</div>

<script>
const S = {
  name:'', day:1,
  steps:{1:{cur:0,done:[]},2:{cur:0,done:[]},3:{cur:0,done:[]}},
  resp:{}, votes:{}
};

const DAYS = {
  1:['welcome','poem','events','pitch','preview'],
  2:['d2welcome','truths','act-eng','act-math','goals','vision'],
  3:['d3welcome','budget','alumni','dilemma','declare']
};

async function ai(system, user) {
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system,messages:[{role:'user',content:user}]})
    });
    const d = await r.json();
    return d.content?.[0]?.text || 'Try again in a moment.';
  } catch(e){ return 'Could not reach the AI coach. Please check your connection and try again.'; }
}

function loading(id){
  document.getElementById(id).innerHTML = `<div class="ai-box"><div class="ai-label">&#x1F916; AI Coach</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
}
function showAI(id,txt){
  document.getElementById(id).innerHTML = `<div class="ai-box"><div class="ai-label">&#x1F916; AI Coach</div><div class="ai-text">${txt.replace(/\n/g,'<br>')}</div></div>`;
}
function show(id){ document.getElementById(id).style.display='block'; }

function pct(){
  const steps = DAYS[S.day];
  const p = Math.round((S.steps[S.day].done.length / steps.length)*100);
  document.getElementById('pbar').style.width = p+'%';
}

function switchDay(d){
  S.day = d;
  [1,2,3].forEach(i=>{
    const all = DAYS[i].length, done = S.steps[i].done.length;
    document.getElementById('tab'+i).className = 'dtab' + (i===d?' active':'') + (done===all&&all>0?' done':'');
  });
  pct(); render();
}

function advance(){
  const steps = DAYS[S.day];
  const s = S.steps[S.day];
  if(!s.done.includes(steps[s.cur])) s.done.push(steps[s.cur]);
  if(s.cur < steps.length-1) s.cur++;
  pct(); render();
}

function markDone(day){
  const steps = DAYS[day];
  const s = S.steps[day];
  const cur = steps[s.cur];
  if(!s.done.includes(cur)) s.done.push(cur);
  pct();
  document.getElementById('tab'+day).className = 'dtab' + (S.day===day?' active':'') + (s.done.length===steps.length?' done':'');
}

function render(){
  if(S.day===1) rDay1();
  if(S.day===2) rDay2();
  if(S.day===3) rDay3();
}

// ── DAY 1 ─────────────────────────────────────────────────────
function rDay1(){
  const c = S.steps[1].cur;
  let h = '';
  if(c===0){
    h = `<div class="card">
      <div class="card-header"><div class="step-num sn-active">1</div><div><div class="card-title">Welcome to Upward Bound</div><div class="card-sub">Day 1 — Who Are You?</div></div></div>
      <div class="prompt"><strong>First things first.</strong> What's your name? The AI coach will use it throughout all three days.</div>
      <input class="name-inp" id="nf" placeholder="Your first name..." value="${S.name}">
      <div class="row"><button class="btn btn-primary" onclick="saveName()">Let's go &#x2192;</button></div>
    </div>`;
  } else if(c===1){
    h = `<div class="card">
      <div class="card-header"><div class="step-num sn-active">2</div><div><div class="card-title">The "I Am From" poem</div><div class="card-sub">Identity + voice · Public speaking practice</div></div><div class="timer-badge">&#x23F1; 8 min</div></div>
      <div class="prompt"><strong>Your turn, ${S.name}.</strong> Complete each line with something real and specific from your life. Don't overthink it — the goal is honesty, not perfection.<br><br>Be specific: not "a small town" but "the sound of the screen door slamming every morning."</div>
      <div style="background:var(--purple-light);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;font-size:13px;line-height:2;color:var(--purple-dark)">
        <div style="font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--purple);margin-bottom:6px">Complete each line in the box below — keep this open as a reference</div>
        <div>1. I am from... <span style="color:var(--text-muted)">(a place, a smell, a sound)</span></div>
        <div>2. I am from... <span style="color:var(--text-muted)">(a food or routine from childhood)</span></div>
        <div>3. I am from... <span style="color:var(--text-muted)">(something your family says or believes)</span></div>
        <div>4. I am from... <span style="color:var(--text-muted)">(a person who shaped you)</span></div>
        <div>5. I am from... <span style="color:var(--text-muted)">(something you were told you couldn't do)</span></div>
        <div>6. I am from... <span style="color:var(--text-muted)">(something you're proud of)</span></div>
        <div>7. I am from... <span style="color:var(--text-muted)">(where you're going — a dream or goal)</span></div>
      </div>
      <textarea id="poem" placeholder="Write your poem here — one line at a time...">${S.resp.poem||''}</textarea>
      <div class="row"><button class="btn btn-primary" onclick="subPoem()">Submit for feedback &#x2192;</button></div>
      <div id="poem-fb"></div>
      <div id="poem-nx" style="display:none"><div class="divider"></div><div class="row"><button class="btn btn-primary" onclick="advance()">Next activity &#x2192;</button></div></div>
    </div>`;
  } else if(c===2){
    h = `<div class="card">
      <div class="card-header"><div class="step-num sn-active">3</div><div><div class="card-title">Current events — your take</div><div class="card-sub">Critical thinking · 10 minutes</div></div><div class="timer-badge">&#x23F1; 10 min</div></div>
      <div class="prompt"><strong>Read this headline:</strong><br><br>"Scientists confirm the ocean absorbed record levels of heat last year — raising urgent concerns about sea level rise, stronger hurricanes, and coral reef extinction within a generation."<br><br>Answer all three questions below.</div>
      <textarea id="ce" placeholder="1. What happened? (in your own words)
2. Why does this matter to someone your age specifically?
3. If you were in charge — what would you do?" style="min-height:120px">${S.resp.events||''}</textarea>
      <div class="row"><button class="btn btn-primary" onclick="subCE()">Get AI feedback &#x2192;</button></div>
      <div id="ce-fb"></div>
      <div id="ce-nx" style="display:none"><div class="divider"></div><div class="row"><button class="btn btn-primary" onclick="advance()">Next activity &#x2192;</button></div></div>
    </div>`;
  } else if(c===3){
    h = `<div class="card">
      <div class="card-header"><div class="step-num sn-active">4</div><div><div class="card-title">Your 60-second pitch</div><div class="card-sub">Public speaking · community problem solving</div></div><div class="timer-badge">&#x23F1; 15 min</div></div>
      <div class="prompt"><strong>The question:</strong> What is one problem in your community you would fix if you had the power?<br><br>Write your answer as a 60-second spoken response — about 120–150 words. Open with a strong hook. Be specific about the problem. Propose a real solution. Close with impact.</div>
      <textarea id="pitch" placeholder="Open strong — grab attention immediately.
Describe the problem specifically.
Propose your solution clearly.
Close with a call to action or powerful statement." style="min-height:130px">${S.resp.pitch||''}</textarea>
      <div class="row"><button class="btn btn-primary" onclick="subPitch()">Get coaching feedback &#x2192;</button></div>
      <div id="pitch-fb"></div>
      <div id="pitch-nx" style="display:none"><div class="divider"></div><div class="row"><button class="btn btn-primary" onclick="advance()">Next activity &#x2192;</button></div></div>
    </div>`;
  } else if(c===4){
    h = `<div class="card">
      <div class="card-header"><div class="step-num sn-active">5</div><div><div class="card-title">Your summer preview</div><div class="card-sub">What's coming in person</div></div></div>
      <div class="prompt"><strong>${S.name}, here is what you're about to experience:</strong><br><br>
      English &nbsp;·&nbsp; Upper Level Math &nbsp;·&nbsp; Human Anatomy &nbsp;·&nbsp; Chemistry &nbsp;·&nbsp; Film Making &nbsp;·&nbsp; <strong>Drones</strong> &nbsp;·&nbsp; Fitness &nbsp;·&nbsp; Martial Arts<br><br>
      Which course excites you most — and why? Which one makes you most nervous?</div>
      <textarea id="prev" placeholder="I'm most excited about... because...
The one that makes me nervous is... because..." style="min-height:80px">${S.resp.preview||''}</textarea>
      <div class="row"><button class="btn btn-success" onclick="subPreview()">Complete Day 1 &#x2713;</button></div>
      <div id="prev-fb"></div>
    </div>`;
  }
  document.getElementById('content').innerHTML = h;
}

async function saveName(){
  const n = document.getElementById('nf').value.trim();
  if(!n){alert('Please enter your name!');return;}
  S.name = n;
  document.getElementById('greet').textContent = 'Hi, '+n+'!';
  advance();
}
async function subPoem(){
  const v = document.getElementById('poem').value.trim();
  if(v.length<40){alert('Please complete at least a few lines before submitting.');return;}
  S.resp.poem = v; loading('poem-fb');
  const r = await ai(
    `You are a warm, affirming Upward Bound workshop coach responding to a high school student's "I Am From" poem. Be encouraging and specific. 1) Name 2 vivid details you loved from their actual poem (quote short phrases). 2) Give one gentle tip to make one line even more specific. Keep it conversational, under 110 words. Sign off with a brief hype line about their voice.`,
    `Student: ${S.name}\nPoem:\n${v}`
  );
  showAI('poem-fb',r); show('poem-nx');
}
async function subCE(){
  const v = document.getElementById('ce').value.trim();
  if(v.length<30){alert('Please write more before submitting.');return;}
  S.resp.events = v; loading('ce-fb');
  const r = await ai(
    `You are a Upward Bound coach. The student analyzed a current events headline about record ocean heat. Affirm what was strong in their analysis. Then ask ONE sharp follow-up question to push their thinking deeper — something that connects this to their own future. Under 90 words.`,
    `Student: ${S.name}\nResponse:\n${v}`
  );
  showAI('ce-fb',r); show('ce-nx');
}
async function subPitch(){
  const v = document.getElementById('pitch').value.trim();
  if(v.length<50){alert('Please write more before submitting.');return;}
  S.resp.pitch = v; loading('pitch-fb');
  const r = await ai(
    `You are a public speaking coach for Upward Bound high school students. Give: 1) GLOW — one specific thing that worked (quote their exact words). 2) GROW — one concrete technique to improve it (stronger opening, tighter close, more specific detail, etc). Be direct and encouraging. Under 120 words.`,
    `Student: ${S.name}\nPitch:\n${v}`
  );
  showAI('pitch-fb',r); show('pitch-nx');
}
async function subPreview(){
  const v = document.getElementById('prev').value.trim();
  if(v.length<20){alert('Please write your answer before finishing.');return;}
  S.resp.preview = v; loading('prev-fb');
  const r = await ai(
    `You are an enthusiastic Upward Bound coach. The student shared which course excites them and which makes them nervous. Validate both feelings and connect their excitement or nervousness to the growth mindset — nervous = your brain knowing it's about to grow. End with a punchy, personal hype line. Under 90 words.`,
    `Student: ${S.name}\nResponse:\n${v}`
  );
  showAI('prev-fb',r);
  markDone(1);
  document.getElementById('content').innerHTML += `<div class="complete"><div class="complete-title">Day 1 complete, ${S.name}!</div><div class="complete-sub">You showed up. You wrote. You spoke. Switch to Day 2 above whenever you're ready.</div></div>`;
}

// ── DAY 2 ─────────────────────────────────────────────────────
const ACT = {
  eng:[
    {q:'Which best replaces the underlined sentence?',
     pass:'"Marcus had always been interested in science and volunteered at a hospital. [The experience changed his perspective greatly.] Working alongside nurses and doctors, he realized that medicine required not only knowledge but also compassion."',
     opts:['A. The experience, which was very impactful, changed his perspective in a great way.','B. His perspective was greatly changed by the experience he had there.','C. Working there shifted how Marcus thought about his future career.','D. The experience changed his perspective, and it was a big change for him.'],
     ans:'C',explain:'C is correct — it\'s the most concise and tells us HOW his perspective changed (toward his future). A and D are wordy/redundant. B uses awkward passive voice. Strategy: eliminate wordy, vague, or redundant choices.'},
    {q:'Where would this sentence best fit? "Some researchers believe older trees use these networks to support younger seedlings."',
     pass:'"(1) Scientists discovered trees communicate through underground fungal networks. (2) These networks allow trees to share nutrients and send warning signals when under attack."',
     opts:['A. Before sentence 1 as an introduction','B. After sentence 1 to give context','C. After sentence 2 — it gives a specific example of network use','D. It should NOT be added — it contradicts the main idea'],
     ans:'C',explain:'C is correct. The new sentence gives a specific example of how the network is used — supporting seedlings. It follows sentence 2 logically. Always check what comes before AND after the insertion point.'},
    {q:'Which choice best concludes a paragraph about community involvement in a park renovation?',
     pass:'"The city council approved a renovation plan including new trails, a community garden, and an amphitheater. Many residents submitted feedback during the public comment period, and their ideas were incorporated."',
     opts:['A. The amphitheater will seat up to 500 people and cost $200,000.','B. Council members said the park would open by next spring.','C. The final design is a direct reflection of what residents said they wanted.','D. Future phases of renovation are still being discussed.'],
     ans:'C',explain:'C is correct. The paragraph\'s main idea is community involvement. A strong conclusion reinforces that theme. A adds unrelated cost data. B shifts to timeline. D introduces a new idea. Identify the paragraph\'s main idea before reading the choices.'}
  ],
  math:[
    {q:'A store sells small drinks ($3.50) and large drinks ($5.00). They sold 80 drinks and collected $340. How many small drinks were sold?',

function renderACTQ(section, qIdx){
  const qs = ACT[section];
  const q = qs[qIdx];
  const container = document.getElementById(`act-${section}-container`);
  if(!container) return;
  let html = `<div id="act-${section}-q${qIdx}">`;
  html += `<div class="q-label">Q${qIdx+1} of ${qs.length}</div>`;
  if(q.pass) html += `<div class="passage">${q.pass}</div>`;
  html += `<div class="q-text">${q.q}</div>`;
  html += `<div class="choices" id="choices-${section}-${qIdx}">`;
  q.opts.forEach((opt,i)=>{
    const letter = 'ABCD'[i];
    html += `<button class="choice" onclick="answerACT('${section}',${qIdx},'${letter}')">${opt}</button>`;
  });
  html += `</div><div id="explain-${section}-${qIdx}"></div></div>`;
  container.innerHTML = (container.innerHTML || '') + html;
}

function answerACT(section, qIdx, chosen){
  const q = ACT[section][qIdx];
  const correct = q.ans;
  const isRight = chosen === correct;
  const btns = document.querySelectorAll(`#choices-${section}-${qIdx} .choice`);
  btns.forEach(btn=>{
    btn.disabled = true;
    const letter = btn.textContent.trim()[0];
    if(letter === correct) btn.className = 'choice correct';
    else if(letter === chosen && !isRight) btn.className = 'choice wrong';
  });
  document.getElementById(`explain-${section}-${qIdx}`).innerHTML =
    `<div class="explain-box"><strong>${isRight?'Correct!':'Not quite —'}</strong> ${q.explain}</div>`;
  const qs = ACT[section];
  setTimeout(()=>{
    if(qIdx+1 < qs.length){
      renderACTQ(section, qIdx+1);
    } else {
      show(`${section==='eng'?'eng':'math'}-nx`);
    }
  }, 600);
}

function calcB(){
  const ids = [0,1,2,3,4,5,6,7,8];

  total = Math.round(total);
  const rem = 2400 - total;
  document.getElementById('btot-n').textContent = '$'+total.toLocaleString();
  document.getElementById('brem-n').textContent = '$'+rem.toLocaleString();
  const el = document.getElementById('bremain');
  if(rem < 0){ el.style.background='var(--danger-light)'; el.style.color='var(--danger)'; }
  else if(rem < 100){ el.style.background='var(--warning-light)'; el.style.color='var(--warning)'; }
  else { el.style.background='var(--success-light)'; el.style.color='var(--success)'; }
}
